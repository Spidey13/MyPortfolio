# Portal Scanner Configuration — Prathamesh More
# Optimized for: Entry-level AI/ML Engineer, SWE (Python), Data Scientist
# Focus: Startups (Seed → Series B), YC companies, recently funded AI cos
# Geography: US (open to relocation), remote-friendly

title_filter:
  positive:
    # -- AI/ML (primary) --
    - "AI Engineer"
    - "ML Engineer"
    - "Machine Learning"
    - "AI"
    - "ML"
    - "LLM"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "MLOps"
    - "LLMOps"
    - "Applied AI"
    - "Applied Scientist"
    - "Research Engineer"
    - "Data Scientist"
    - "Deep Learning"
    # -- Agentic / RAG --
    - "Agent"
    - "Agentic"
    - "RAG"
    - "Voice AI"
    - "Conversational AI"
    # -- SWE roles --
    - "Software Engineer"
    - "Backend Engineer"
    - "Full Stack"
    - "Python Engineer"
    - "Platform Engineer"
    # -- Entry-level keywords --
    - "New Grad"
    - "University Grad"
    - "Early Career"
    - "Associate"
    - "Junior"
    - "Entry Level"
    - "Founding Engineer"
  negative:
    - "Director"
    - "VP"
    - "Principal"
    - "Distinguished"
    - ".NET"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Blockchain"
    - "Web3"
    - "SAP "
    - "Mainframe"
    - "COBOL"
    - "10+ years"
    - "15+ years"
    - "8+ years"
  seniority_boost:
    - "Junior"
    - "Associate"
    - "New Grad"
    - "Entry"
    - "Founding"

# ==========================================================================
# SEARCH QUERIES
# ==========================================================================

search_queries:

  # -- New Grad / Early Career --
  - name: Greenhouse — New Grad AI/ML/SWE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "New Grad" OR "Early Career" OR "University Grad" "AI" OR "ML" OR "Software Engineer"'
    enabled: true
  - name: Ashby — New Grad AI/ML/SWE
    query: 'site:jobs.ashbyhq.com "New Grad" OR "Early Career" OR "University Grad" "AI" OR "ML" OR "Engineer"'
    enabled: true
  - name: Lever — New Grad AI/ML/SWE
    query: 'site:jobs.lever.co "New Grad" OR "Early Career" "AI" OR "ML" OR "Software Engineer"'
    enabled: true
  - name: All boards — New Grad 2025
    query: '"New Grad" OR "Recent Graduate" "AI" OR "Machine Learning" OR "Data Science" "Engineer" 2025'
    enabled: true

  # -- Founding Engineer (startup-first) --
  - name: Ashby — Founding Engineer
    query: 'site:jobs.ashbyhq.com "Founding Engineer" OR "Founding Software Engineer" AI OR ML OR LLM'
    enabled: true
  - name: Greenhouse — Founding Engineer
    query: 'site:job-boards.greenhouse.io "Founding Engineer" AI OR ML OR LLM'
    enabled: true
  - name: YC — Founding Engineer
    query: 'site:workatastartup.com "Founding Engineer" OR "Founding" "AI" OR "ML"'
    enabled: true

  # -- AI / ML Engineer --
  - name: Ashby — AI/ML Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "ML Engineer" OR "Applied AI" OR "Machine Learning Engineer"'
    enabled: true
  - name: Greenhouse — AI/ML Engineer
    query: 'site:job-boards.greenhouse.io "AI Engineer" OR "ML Engineer" OR "Applied AI" OR "LLM Engineer"'
    enabled: true
  - name: Lever — AI/ML Engineer
    query: 'site:jobs.lever.co "AI Engineer" OR "ML Engineer" OR "Applied AI" OR "Machine Learning"'
    enabled: true
  - name: Ashby — Agentic & RAG
    query: 'site:jobs.ashbyhq.com "Agentic" OR "RAG" OR "AI Agent" OR "LLM" OR "GenAI Engineer"'
    enabled: true
  - name: Greenhouse — Agentic & RAG
    query: 'site:job-boards.greenhouse.io "Agentic" OR "RAG" OR "AI Agent" OR "GenAI"'
    enabled: true

  # -- Software Engineer (Python / Backend / Full Stack) --
  - name: Ashby — SWE Python/Backend
    query: 'site:jobs.ashbyhq.com "Software Engineer" "Python" OR "Backend" OR "Full Stack"'
    enabled: true
  - name: Greenhouse — SWE Python/Backend
    query: 'site:job-boards.greenhouse.io "Software Engineer" "Python" OR "Backend" OR "Full Stack"'
    enabled: true
  - name: Lever — SWE Python/Backend
    query: 'site:jobs.lever.co "Software Engineer" "Python" OR "Backend" OR "Full Stack" OR "AI"'
    enabled: true

  # -- Data Scientist / MLOps --
  - name: Ashby — Data Science & MLOps
    query: 'site:jobs.ashbyhq.com "Data Scientist" OR "MLOps" OR "ML Platform" OR "LLMOps"'
    enabled: true
  - name: Greenhouse — Data Science & MLOps
    query: 'site:job-boards.greenhouse.io "Data Scientist" OR "MLOps" OR "ML Platform"'
    enabled: true

  # -- Voice AI / NLP --
  - name: Voice AI & NLP — All portals
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice AI" OR "Conversational AI" OR "NLP Engineer" OR "Speech"'
    enabled: true

  # -- Startup-focused aggregators --
  - name: YC Work at a Startup — AI/ML
    query: 'site:workatastartup.com "AI Engineer" OR "ML Engineer" OR "Applied AI" OR "Software Engineer" "Python"'
    enabled: true
  - name: Wellfound — AI/ML Startups
    query: 'site:wellfound.com "AI Engineer" OR "ML Engineer" OR "Machine Learning" OR "Data Scientist"'
    enabled: true
  - name: Workable — AI/ML
    query: 'site:apply.workable.com "AI Engineer" OR "ML Engineer" OR "Machine Learning"'
    enabled: true
  - name: HN Who's Hiring — AI/ML
    query: 'site:news.ycombinator.com "AI Engineer" OR "ML Engineer" OR "Machine Learning" OR "New Grad" hiring'
    enabled: true
  - name: Himalayas — AI/ML
    query: 'site:himalayas.app "AI Engineer" OR "ML Engineer" OR "Machine Learning Engineer"'
    enabled: true
  - name: ai-jobs.net — AI/ML US
    query: 'site:ai-jobs.net "AI Engineer" OR "ML Engineer" OR "Applied AI" United States'
    enabled: true
  - name: TrueUp — AI/ML
    query: 'site:trueup.io "AI Engineer" OR "ML Engineer" OR "Machine Learning" OR "New Grad"'
    enabled: true
  - name: RemoteOK — AI/ML
    query: 'site:remoteok.com "AI Engineer" OR "ML Engineer" OR "Machine Learning" OR "Python"'
    enabled: true
  - name: BuiltIn — AI/ML
    query: 'site:builtin.com "AI Engineer" OR "ML Engineer" OR "Machine Learning" startup'
    enabled: true

  # -- Texas local --
  - name: Texas — AI/ML roles
    query: '"AI Engineer" OR "ML Engineer" OR "Software Engineer" "Python" Dallas OR Austin OR Houston OR Texas'
    enabled: true
  - name: BuiltIn Austin — AI
    query: 'site:builtinaustin.com OR site:builtin.com Austin "AI" OR "Machine Learning" OR "Software Engineer"'
    enabled: true

  # -- Big Tech new grad (keep a few, not the focus) --
  - name: Google — New Grad AI/ML
    query: 'site:careers.google.com "AI" OR "Machine Learning" "New Grad" OR "Early Career"'
    enabled: true
  - name: Meta — New Grad AI/ML
    query: 'site:metacareers.com "AI" OR "Machine Learning" "New Grad" OR "University"'
    enabled: true
  - name: Amazon — New Grad AI/ML
    query: 'site:amazon.jobs "Applied Scientist" OR "Machine Learning" "New Grad" OR "Entry"'
    enabled: true

